spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sobzy-db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    dll-auto: update
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update

# Development Specific Overrides
app:
  ml:
    # Use environment variables or local paths that are common
    python-path: ${PYTHON_PATH:python} 
    script-path: scripts
  
  network:
    automation:
      enabled: ${NETWORK_AUTO:true}
      ssid: ${HOTSPOT_SSID:Sobzy_Dev_Hotspot}
      password: ${HOTSPOT_PASS:Sobzy12345}
      interface: ${INTERNET_INTERFACE:Wi-Fi}
